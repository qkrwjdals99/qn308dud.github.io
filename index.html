<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한둬얼 팬 아카이브</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">

    <div class="logo">
        <img src="https://via.placeholder.com/90" alt="">
        <h2>한둬얼</h2>
    </div>

    <nav>
        <a href="#">📅 일정</a>
        <a href="#">📢 공지</a>
        <a href="#">▶ 유튜브</a>
        <a href="#">☕ 팬카페</a>
        <a href="#">🛠 유틸리티</a>
    </nav>

    <button class="mode-btn">한둬얼 팬카페</button>

</div>

<div class="main">

    <div class="header">
        <h1>🔵 한둬얼 일정</h1>
        <button>사이트 보기</button>
    </div>

    <div class="calendar-box">

        <div class="calendar-title">
            <h2>6월 달력</h2>
            <span>2026</span>
        </div>

        <div class="weekdays">
            <div>일</div>
            <div>월</div>
            <div>화</div>
            <div>수</div>
            <div>목</div>
            <div>금</div>
            <div>토</div>
        </div>

        <div class="calendar" id="calendar"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
