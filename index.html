<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한둬얼 일정</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📅 한둬얼 일정</h1>
    <h2>2026년 6월</h2>

    <div class="calendar">
        <div class="day header">일</div>
        <div class="day header">월</div>
        <div class="day header">화</div>
        <div class="day header">수</div>
        <div class="day header">목</div>
        <div class="day header">금</div>
        <div class="day header">토</div>

        <div class="day">1<br><span>한국도착</span></div>
        <div class="day rest">2<br><span>휴방</span></div>
        <div class="day">3<br><span>무수쉐퍼데이</span></div>
        <div class="day">4<br><span>스윙스 유튜브</span></div>
        <div class="day">5<br><span>갠방</span></div>
        <div class="day">6<br><span>카드쇼</span></div>

        <div class="day">7<br><span>칸장지수</span></div>
        <div class="day">8<br><span>봉오리합방</span></div>
        <div class="day">9<br><span>카드깡</span></div>
        <div class="day rest">10<br><span>휴방</span></div>
        <div class="day rest">11<br><span>휴방</span></div>
    </div>
</div>

</body>
</html>
